<div class="container main-container">
	<h1>Detalhes do {{ fornecedor.nome }}</h1>

	<div>
		<h4>Informação somente leitura</h4>

		<hr />

		<dl class="row">
			<dt class="col-sm-2">Nome</dt>

			<dd class="col-sm-10">
				{{ fornecedor.nome }}
			</dd>

			<dt class="col-sm-2">Documento</dt>

			<dd class="col-sm-10">
				{{ fornecedor.documento | documento }}
			</dd>

			<dt class="col-sm-2">Ativo</dt>

			<dd class="col-sm-10">
				<input type="checkbox" class="check-box" [checked]="fornecedor.ativo" disabled />
			</dd>
		</dl>

		<div class="row">
			<iframe
				width="100%"
				height="450"
				style="border: 0; padding-bottom: 50px"
				[src]="enderecoMap"
				loading="lazy"
				allowfullscreen
			>
			</iframe>
		</div>
	</div>

	<div>
		<a class="btn btn-dark" [routerLink]="['/fornecedores/editar', fornecedor.id]">Editar</a>
		&nbsp;
		<a class="btn btn-info" [routerLink]="['/fornecedores/listar-todos']">Voltar</a>
	</div>

	<lista-produto [produtos]="fornecedor.produtos"></lista-produto>
</div>
