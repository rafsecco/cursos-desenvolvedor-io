<div class="container main-container">
	<h1>Lista de Fornecedores</h1>

	<p>
		<a class="btn btn-info" [routerLink]="['/fornecedores/adicionar-novo']">
			Novo Fornecedor
		</a>
	</p>

	@if (errorMessage()) {
		<div class="alert alert-danger">
			{{ errorMessage() }}
		</div>
	}

	<table class="table table-hover">
		<thead class="thead-dark">
			<tr>
				<th>Nome</th>
				<th>Documento</th>
				<th>Ativo?</th>
				<th></th>
			</tr>
		</thead>

		<tbody>
			@for (fornecedor of fornecedores(); track fornecedor.id) {
				<tr>
					<td>{{ fornecedor.nome }}</td>

					<td>{{ fornecedor.documento | documento }}</td>

					<td>
						<input
							type="checkbox"
							class="check-box"
							[checked]="fornecedor.ativo"
							disabled
						/>
					</td>

					<td class="text-end">
						<a
							class="btn btn-info"
							[routerLink]="['/fornecedores/detalhes', fornecedor.id]"
							aria-label="Detalhes do fornecedor"
						>
							<span class="fa fa-search"></span>
						</a>

						&nbsp;

						<a
							class="btn btn-warning"
							[routerLink]="['/fornecedores/editar', fornecedor.id]"
							aria-label="Editar fornecedor"
						>
							<span class="fa fa-pencil-alt"></span>
						</a>

						&nbsp;

						<a
							class="btn btn-danger"
							[routerLink]="['/fornecedores/excluir', fornecedor.id]"
							aria-label="Excluir fornecedor"
						>
							<span class="fa fa-trash"></span>
						</a>
					</td>
				</tr>
			} @empty {
				<tr>
					<td colspan="4" class="text-center">Nenhum fornecedor encontrado.</td>
				</tr>
			}
		</tbody>
	</table>
</div>
