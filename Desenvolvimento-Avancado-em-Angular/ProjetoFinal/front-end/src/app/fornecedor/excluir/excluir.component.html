<div class="container main-container">
	<h3>Tem certeza que deseja excluir o fornecedor {{ fornecedor.nome }} ?</h3>
	<hr />

	@if (errors().length > 0) {
		<div class="alert alert-danger">
			<h3 id="msgRetorno">Opa! Alguma coisa não deu certo:</h3>

			<ul>
				@for (error of errors(); track $index) {
					<li>{{ error }}</li>
				}
			</ul>
		</div>
	}

	<dl class="row">
		<dt class="col-sm-2">
			<label class="control-label">Nome</label>
		</dt>
		<dd class="col-sm-10">
			{{ fornecedor.nome }}
		</dd>
		<dt class="col-sm-2">
			<label class="control-label">Documento</label>
		</dt>
		<dd class="col-sm-10">
			{{ fornecedor.documento | documento }}
		</dd>
		<dt class="col-sm-2">
			<label class="control-label">Ativo</label>
		</dt>
		<dd class="col-sm-10">
			<input type="checkbox" class="check-box" [checked]="fornecedor.ativo" disabled />
		</dd>
	</dl>
	<div class="row">
		<br />
		<iframe
			width="100%"
			height="450"
			style="border: 0; padding-bottom: 50px"
			[src]="enderecoMap"
			allowfullscreen
		></iframe>
	</div>

	<div>
		<button type="button" class="btn btn-danger" (click)="excluirEvento()">Excluir</button>
		&nbsp;
		<a class="btn btn-info" [routerLink]="['/fornecedores/listar-todos']">Voltar</a>
	</div>
</div>
