<div class="container main-container">
	<h3>Detalhes do {{ produto.nome }}</h3>
	<hr />

	<div class="row">
		<div class="col-md-4">
			<img
				[src]="imagens + produto.imagem"
				[alt]="produto.nome"
				style="width: 300px; height: 428px; object-fit: cover"
				loading="lazy"
			/>
		</div>

		<div class="col-md-6">
			<dl>
				<dt>Fornecedor</dt>
				<dd>{{ produto.nomeFornecedor }}</dd>

				<dt>Nome</dt>
				<dd>{{ produto.nome }}</dd>

				<dt>Descrição</dt>
				<dd>{{ produto.descricao }}</dd>

				<dt>Valor</dt>
				<dd>{{ produto.valor | currency: 'BRL' : 'symbol' : '1.2-2' : 'pt-BR' }}</dd>

				<dt>Data de Cadastro</dt>
				<dd>{{ produto.dataCadastro | date: 'dd/MM/yyyy' }}</dd>

				<dt>Ativo?</dt>
				<dd>
					<input type="checkbox" class="check-box" [checked]="produto.ativo" disabled />
				</dd>
			</dl>

			<div>
				<a class="btn btn-warning" [routerLink]="['/produtos/editar', produto.id]">Editar</a>
				&nbsp;
				<a class="btn btn-info" [routerLink]="['/produtos/listar-todos']">Voltar</a>
			</div>
		</div>
	</div>
</div>
