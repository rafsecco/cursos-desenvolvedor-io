<div class="container main-container">
	<h1>Login</h1>

	<form novalidate (ngSubmit)="login()" [formGroup]="loginForm">
		<h4>Entre na sua conta</h4>
		<hr />

		@if (errors.length > 0) {
			<div class="alert alert-danger">
				<h3 id="msgRetorno">Opa! Alguma coisa não deu certo:</h3>

				<ul>
					@for (error of errors; track error) {
						<li>{{ error }}</li>
					}
				</ul>
			</div>
		}

		<div class="form-group">
			<label class="col-md-2 control-label">E-mail</label>

			<div class="col-md-10">
				<input
					class="form-control"
					id="email"
					type="text"
					placeholder="E-mail (requerido)"
					formControlName="email"
					[class.is-invalid]="displayMessage['email']"
				/>

				@if (displayMessage['email']) {
					<span class="text-danger">
						<p [innerHTML]="displayMessage['email']"></p>
					</span>
				}
			</div>
		</div>

		<div class="form-group">
			<label class="col-md-2 control-label">Senha</label>

			<div class="col-md-10">
				<input
					class="form-control"
					id="password"
					type="password"
					placeholder="Senha (requerido)"
					formControlName="password"
					[class.is-invalid]="displayMessage['password']"
				/>

				@if (displayMessage['password']) {
					<span class="text-danger">
						<p [innerHTML]="displayMessage['password']"></p>
					</span>
				}
			</div>
		</div>

		<div class="form-group">
			<div class="col-md-4 col-md-offset-2">
				<button
					class="btn btn-success"
					id="Login"
					[disabled]="loginForm.invalid"
					type="submit"
				>
					Login
				</button>
			</div>
		</div>
	</form>
</div>
